<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Text symbol (A) -->
  <path d="M 120 250 L 150 150 L 180 250" 
        fill="none" 
        stroke="url(#mainGrad)" 
        stroke-width="20" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  <line x1="130" y1="220" x2="170" y2="220" 
        stroke="url(#mainGrad)" 
        stroke-width="20" 
        stroke-linecap="round"/>
  
  <!-- Arrow -->
  <line x1="190" y1="200" x2="210" y2="200" 
        stroke="url(#mainGrad)" 
        stroke-width="16" 
        stroke-linecap="round"/>
  <path d="M 200 190 L 210 200 L 200 210" 
        fill="none" 
        stroke="url(#mainGrad)" 
        stroke-width="16" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- Image symbol (picture frame) -->
  <rect x="230" y="150" width="100" height="100" 
        rx="8" 
        fill="none" 
        stroke="url(#mainGrad)" 
        stroke-width="20"/>
  
  <!-- Sun in frame -->
  <circle cx="260" cy="180" r="12" fill="url(#mainGrad)"/>
  
  <!-- Mountain in frame -->
  <path d="M 235 235 L 260 200 L 285 225 L 310 195 L 325 225 L 325 245 L 235 245 Z" 
        fill="url(#mainGrad)" 
        opacity="0.6"/>
</svg>